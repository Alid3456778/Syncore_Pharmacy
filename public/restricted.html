<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Access Restricted</title>
<meta name="robots" content="noindex, nofollow" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #f4f6f8;
    color: #1f2937;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #ffffff;
    max-width: 460px;
    width: 100%;
    padding: 40px 32px;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    text-align: center;
  }
  .icon {
    width: 56px;
    height: 56px;
    margin: 0 auto 20px;
    border-radius: 50%;
    background: #fef2f2;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon svg { width: 28px; height: 28px; }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 12px;
    color: #111827;
  }
  p {
    font-size: 14px;
    line-height: 1.6;
    color: #6b7280;
    margin-bottom: 8px;
  }
  .btn {
    display: inline-block;
    margin-top: 24px;
    padding: 10px 28px;
    background: #2563eb;
    color: #ffffff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    border-radius: 8px;
    transition: background 0.15s ease;
  }
  .btn:hover { background: #1d4ed8; }
  .footnote {
    margin-top: 20px;
    font-size: 12px;
    color: #9ca3af;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line>
      </svg>
    </div>
    <h1>Access Restricted</h1>
    <p>Sorry, this site isn't available in your region, or your connection appears to be using a VPN or proxy.</p>
    <p>Please disable any VPN/proxy and try again.</p>
    <a class="btn" href="/retry">Retry</a>
    <div class="footnote">If you believe this is a mistake, please contact support.</div>
  </div>
</body>
</html>
