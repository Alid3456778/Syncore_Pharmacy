name: CI CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  verify-db-url:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verify DATABASE_URL in .env
        run: |
          if ! grep -q "DATABASE_URL=postgres://postgres:postsql@localhost:5432/datamc" .env; then
            echo "Error: DATABASE_URL is not set correctly in .env"
            exit 1
          fi

  deploy:
     # ← CI must pass first
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: mclanduser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd apps/Syncore_Pharmacy
            git pull origin main
            npm install
            pm2 restart Syncore_Pharmacy
